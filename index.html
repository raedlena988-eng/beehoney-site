<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bee & Honey | النظام الإداري الذكي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #fef9e6 0%, #fff6e8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .app-wrapper {
            width: 100%;
            max-width: 1400px;
            background: rgba(255,255,240,0.9);
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25);
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        /* شاشة الدخول */
        .login-screen {
            min-height: 85vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .login-card {
            background: white;
            border-radius: 64px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.2);
            border: 1px solid #ffdf9c;
        }

        .center-logo {
            margin-bottom: 2rem;
        }
        .center-logo .logo-icon {
            font-size: 5rem;
            background: #f7b32b;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            box-shadow: 0 10px 20px rgba(247,179,43,0.3);
        }
        .center-logo h1 {
            font-size: 2.4rem;
            color: #c47a2b;
            font-weight: 800;
        }
        .center-logo p {
            color: #b86f1f;
            margin-top: 0.5rem;
        }

        .input-group {
            margin: 1.5rem 0;
            text-align: right;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #5a3e1b;
        }
        .input-group input {
            width: 100%;
            padding: 1rem 1.2rem;
            border-radius: 60px;
            border: 1.5px solid #ffd966;
            background: #fffef7;
            font-size: 1rem;
        }
        .btn {
            background: #f7b32b;
            border: none;
            padding: 0.9rem;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #3a2a0f;
            cursor: pointer;
            width: 100%;
        }
        .error-msg {
            color: #d9534f;
            margin-top: 1rem;
        }

        /* لوحة التحكم */
        .dashboard {
            display: none;
        }
        .navbar {
            background: #ffefcf;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 2px solid #ffdfaa;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .nav-logo .bee-icon {
            font-size: 2rem;
        }
        .nav-logo span {
            font-size: 1.6rem;
            font-weight: bold;
            color: #b45f1b;
        }
        .logout-btn {
            background: #fff0da;
            border: 1px solid #f7b32b;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            padding: 2.5rem;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 1.8rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #fbe4b0;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 30px -10px rgba(247,179,43,0.3);
        }
        .card-emoji {
            font-size: 3rem;
        }
        .card h3 {
            color: #784a1a;
            margin: 0.5rem 0;
        }

        /* صفحة القسم */
        .section-page {
            display: none;
            padding: 1.5rem;
        }
        .back-btn {
            background: #ffefcf;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            margin-bottom: 1.5rem;
        }
        .consultant-box {
            background: white;
            border-radius: 40px;
            padding: 1.8rem;
        }
        .consultant-header {
            border-bottom: 2px solid #f7d89a;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .questions-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .q-btn {
            background: #fff0e0;
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 60px;
            cursor: pointer;
        }
        .chat-area {
            background: #fefaf2;
            border-radius: 28px;
            padding: 1rem;
            min-height: 250px;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 1rem;
            border: 1px solid #ffe1aa;
        }
        .message {
            margin: 1rem 0;
            padding: 0.7rem 1rem;
            border-radius: 24px;
            max-width: 85%;
        }
        .user-msg {
            background: #f7b32b20;
            border-right: 4px solid #f7b32b;
            text-align: right;
            margin-right: auto;
        }
        .ai-msg {
            background: #ffffff;
            border-left: 4px solid #e6a017;
            text-align: right;
        }
        .input-chat {
            display: flex;
            gap: 0.8rem;
        }
        .input-chat input {
            flex: 1;
            padding: 0.9rem;
            border-radius: 60px;
            border: 1px solid #ffd58c;
        }
        .input-chat button {
            background: #f7b32b;
            border: none;
            padding: 0 1.5rem;
            border-radius: 60px;
            cursor: pointer;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top-color: #f7b32b;
            animation: spin 1s ease-in-out infinite;
            margin-left: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <div class="center-logo">
                <div class="logo-icon"><span>🐝🍯</span></div>
                <h1>BEE & HONEY</h1>
                <p>نظام الإدارة الذكي – مشروبات طبيعية من العسل</p>
            </div>
            <div class="input-group">
                <label>🔐 كلمة المرور</label>
                <input type="password" id="passwordInput" placeholder="••••••••">
            </div>
            <button class="btn" id="loginBtn">تسجيل الدخول</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>

    <div id="dashboardScreen" class="dashboard">
        <div class="navbar">
            <div class="nav-logo"><div class="bee-icon">🐝🍯</div><span>BEE & HONEY</span></div>
            <button class="logout-btn" id="logoutBtn">🚪 تسجيل خروج</button>
        </div>
        <div class="cards-grid" id="cardsContainer"></div>
    </div>

    <div id="sectionContainer" class="section-page"></div>
</div>

<script>
    // ================== أدخل مفتاح API هنا ==================
    const OPENAI_API_KEY = 'YOUR_API_KEY_HERE'; // <--- استبدله بمفتاحك
    
    // تعريف الشركة حسب الصورة المرفقة
    const COMPANY_DESCRIPTION = `Bee & Honey (بي أند هني) هي علامة تجارية متخصصة في إنتاج مشروبات ومكملات غذائية طبيعية وصحية تعتمد بشكل أساسي على العسل الطبيعي كحامل وحيد، وتتميز بخلوها من السكر المضاف والمواد الحافظة والغازات. منتجاتها تشمل: مشروب الزنجبيل مع العسل 250 مل، مشروب الكولاجين مع العسل 250 مل، مشروب الشعير مع العسل 250 مل، وغيرها.`;
    
    const SYSTEM_PROMPT = `أنت خبير استشاري متخصص في شركة "Bee & Honey". 
    
    معلومات عن الشركة: ${COMPANY_DESCRIPTION}
    
    مجالات خبرتك:
    1. إدارة اقتصاد: التحليل الاقتصادي، التكاليف، الأسعار، الجدوى، الأرباح.
    2. إدارة الأزمات: حلول لأزمات الإنتاج، السمعة، الجودة، الإمداد.
    3. إدارة وتنظيم مالي: الميزانيات، التقارير، الهيكل المالي.
    4. إدارة تسويق: استراتيجيات التسويق، الإعلانات، السوشال ميديا، الحملات.
    5. إدارة مبيعات: قنوات التوزيع، زيادة المبيعات، العروض.
    6. دراسات الأسواق والدول اقتصادياً: تحليل الأسواق المحلية والعالمية، فرص التوسع.
    
    أجب دائماً بطريقة مهنية، محددة، وقابلة للتنفيذ. استخدم أرقاماً تقريبية واقعية. ركز على منتجات العسل الطبيعية والمشروبات الصحية.`;
    
    // الأقسام حسب طلب المستخدم
    const sections = [
        { id: "economy", name: "إدارة اقتصاد", emoji: "📊", context: "اقتصاد", questions: ["تحليل التكاليف", "تسعير المنتجات", "هامش الربح"] },
        { id: "crisis", name: "إدارة الأزمات", emoji: "⚠️", context: "أزمات", questions: ["أزمة إمداد العسل", "أزمة جودة المنتج", "أزمة سمعة"] },
        { id: "finance", name: "إدارة وتنظيم مالي", emoji: "📈", context: "مالي", questions: ["هيكل الميزانية", "تحسين السيولة", "تقارير ربع سنوية"] },
        { id: "marketing", name: "إدارة تسويق", emoji: "📢", context: "تسويق", questions: ["الجمهور المستهدف", "حملة إعلانية لمشروب الزنجبيل", "استراتيجية سوشال ميديا"] },
        { id: "sales", name: "إدارة مبيعات", emoji: "💰", context: "مبيعات", questions: ["قنوات توزيع المشروبات", "زيادة المبيعات 30%", "عروض ترويجية"] },
        { id: "markets", name: "دراسات الأسواق والدول اقتصادياً", emoji: "🌍", context: "أسواق", questions: ["السوق السعودي", "السوق الإماراتي", "فرص التصدير"] }
    ];
    
    async function callOpenAI(userMessage, sectionContext) {
        const apiUrl = 'https://api.openai.com/v1/chat/completions';
        const contextualized = `[القسم: ${sectionContext}]\n\nسؤال المستخدم: ${userMessage}`;
        const body = {
            model: 'gpt-3.5-turbo',
            messages: [
                { role: 'system', content: SYSTEM_PROMPT },
                { role: 'user', content: contextualized }
            ],
            temperature: 0.7,
            max_tokens: 800
        };
        try {
            const res = await fetch(apiUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${OPENAI_API_KEY}`
                },
                body: JSON.stringify(body)
            });
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.error?.message || 'خطأ في الاتصال');
            }
            const data = await res.json();
            return data.choices[0].message.content;
        } catch (err) {
            console.error(err);
            return `⚠️ عذراً، حدث خطأ: ${err.message}. تأكد من صحة مفتاح API وإتصال الإنترنت.`;
        }
    }
    
    function renderDashboard() {
        const container = document.getElementById('cardsContainer');
        container.innerHTML = '';
        sections.forEach(s => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="card-emoji">${s.emoji}</div><h3>${s.name}</h3>`;
            card.onclick = () => openSection(s.id);
            container.appendChild(card);
        });
    }
    
    let currentChatArea = null;
    function addMessage(className, text, isLoading = false) {
        if (!currentChatArea) return;
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        if (isLoading) {
            msgDiv.innerHTML = `<div class="loading-spinner"></div> جاري استشارة الخبير...`;
            msgDiv.id = 'loadingMsg';
        } else {
            msgDiv.innerText = text;
        }
        currentChatArea.appendChild(msgDiv);
        currentChatArea.scrollTop = currentChatArea.scrollHeight;
    }
    function removeLoading() {
        const loading = document.getElementById('loadingMsg');
        if (loading) loading.remove();
    }
    
    async function handleQuestion(question, context, chatArea) {
        currentChatArea = chatArea;
        addMessage('user-msg', question);
        addMessage('ai-msg', '', true);
        const answer = await callOpenAI(question, context);
        removeLoading();
        addMessage('ai-msg', answer);
    }
    
    function openSection(sectionId) {
        const section = sections.find(s => s.id === sectionId);
        if (!section) return;
        const dashboard = document.getElementById('dashboardScreen');
        const sectionContainer = document.getElementById('sectionContainer');
        dashboard.style.display = 'none';
        sectionContainer.style.display = 'block';
        
        sectionContainer.innerHTML = `
            <button class="back-btn" id="backBtn">← العودة للرئيسية</button>
            <div class="consultant-box">
                <div class="consultant-header">
                    <div style="font-size:2.5rem;">${section.emoji}</div>
                    <div><h2>${section.name}</h2><p>اسأل الخبير الذكي في Bee & Honey</p></div>
                </div>
                <div class="questions-row" id="questionsRow"></div>
                <div class="chat-area" id="chatArea"></div>
                <div class="input-chat">
                    <input type="text" id="questionInput" placeholder="اكتب سؤالك هنا...">
                    <button id="sendBtn">إرسال</button>
                </div>
            </div>
        `;
        
        const chatArea = document.getElementById('chatArea');
        currentChatArea = chatArea;
        addMessage('ai-msg', `🐝 مرحباً! أنا الخبير الاستشاري في ${section.name} لشركة Bee & Honey. اسألني عن أي شيء يتعلق بهذا القسم.`);
        
        const questionsRow = document.getElementById('questionsRow');
        section.questions.forEach(q => {
            const btn = document.createElement('button');
            btn.className = 'q-btn';
            btn.innerText = q;
            btn.onclick = () => handleQuestion(q, section.context, chatArea);
            questionsRow.appendChild(btn);
        });
        
        document.getElementById('backBtn').onclick = () => {
            sectionContainer.style.display = 'none';
            dashboard.style.display = 'block';
        };
        const input = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');
        const send = () => {
            const q = input.value.trim();
            if (q) handleQuestion(q, section.context, chatArea);
            input.value = '';
        };
        sendBtn.onclick = send;
        input.onkeypress = (e) => { if (e.key === 'Enter') send(); };
    }
    
    // تسجيل الدخول
    const loginScreen = document.getElementById('loginScreen');
    const dashboardScreen = document.getElementById('dashboardScreen');
    const loginBtn = document.getElementById('loginBtn');
    const pwdInput = document.getElementById('passwordInput');
    const loginError = document.getElementById('loginError');
    const logoutBtn = document.getElementById('logoutBtn');
    
    function doLogin() {
        if (pwdInput.value === "BeeHoney2024") {
            loginScreen.style.display = 'none';
            dashboardScreen.style.display = 'block';
            renderDashboard();
            loginError.innerText = '';
        } else {
            loginError.innerText = '❌ كلمة المرور غير صحيحة';
        }
    }
    loginBtn.onclick = doLogin;
    pwdInput.onkeypress = (e) => { if (e.key === 'Enter') doLogin(); };
    logoutBtn.onclick = () => {
        loginScreen.style.display = 'flex';
        dashboardScreen.style.display = 'none';
        document.getElementById('sectionContainer').style.display = 'none';
    };
</script>
</body>
</html>
