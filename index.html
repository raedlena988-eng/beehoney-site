<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bee & Honey | النظام الإداري الذكي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #fef9e6 0%, #fff6e8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        /* الحاوية الرئيسية */
        .app-wrapper {
            width: 100%;
            max-width: 1400px;
            background: rgba(255,255,240,0.9);
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25);
            overflow: hidden;
            backdrop-filter: blur(2px);
            transition: all 0.3s;
        }

        /* شاشة تسجيل الدخول */
        .login-screen {
            min-height: 85vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .login-card {
            background: white;
            border-radius: 64px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.2);
            border: 1px solid #ffdf9c;
        }

        /* الشعار في منتصف صفحة الدخول */
        .center-logo {
            margin-bottom: 2rem;
        }
        .center-logo .logo-icon {
            font-size: 5rem;
            display: inline-block;
            background: #f7b32b;
            width: 100px;
            height: 100px;
            line-height: 1.2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            box-shadow: 0 10px 20px rgba(247,179,43,0.3);
        }
        .center-logo .logo-icon span {
            font-size: 3.5rem;
        }
        .center-logo h1 {
            font-size: 2.4rem;
            color: #c47a2b;
            letter-spacing: -0.5px;
            font-weight: 800;
        }
        .center-logo p {
            color: #b86f1f;
            font-weight: 500;
            margin-top: 0.5rem;
        }

        .input-group {
            margin: 1.5rem 0;
            text-align: right;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #5a3e1b;
        }
        .input-group input {
            width: 100%;
            padding: 1rem 1.2rem;
            border-radius: 60px;
            border: 1.5px solid #ffd966;
            background: #fffef7;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        .input-group input:focus {
            border-color: #f7b32b;
            box-shadow: 0 0 0 3px rgba(247,179,43,0.2);
        }
        .btn {
            background: #f7b32b;
            border: none;
            padding: 0.9rem 1.8rem;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #3a2a0f;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            box-shadow: 0 5px 10px rgba(0,0,0,0.05);
        }
        .btn:hover {
            background: #e6a017;
            transform: scale(0.98);
        }
        .error-msg {
            color: #d9534f;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        /* اللوحة الرئيسية بعد الدخول */
        .dashboard {
            display: none;
        }
        .navbar {
            background: #ffefcf;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 2px solid #ffdfaa;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .nav-logo .bee-icon {
            font-size: 2rem;
        }
        .nav-logo span {
            font-size: 1.6rem;
            font-weight: bold;
            color: #b45f1b;
        }
        .logout-btn {
            background: #fff0da;
            border: 1px solid #f7b32b;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            color: #b45f1b;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            padding: 2.5rem;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 1.8rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #fbe4b0;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 30px -10px rgba(247,179,43,0.3);
            border-color: #f7b32b;
        }
        .card-emoji {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .card h3 {
            color: #784a1a;
            margin-bottom: 0.5rem;
        }
        .card p {
            color: #ad7a3d;
            font-size: 0.9rem;
        }

        /* صفحة القسم (المستشار الذكي) */
        .section-page {
            display: none;
            padding: 1.5rem;
        }
        .back-btn {
            background: #ffefcf;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            margin-bottom: 1.5rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .consultant-box {
            background: white;
            border-radius: 40px;
            padding: 1.8rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .consultant-header {
            border-bottom: 2px solid #f7d89a;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .consultant-header h2 {
            color: #c47a2b;
        }
        .questions-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .q-btn {
            background: #fff0e0;
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.1s;
            color: #a4621a;
        }
        .q-btn:hover {
            background: #f7b32b;
            color: white;
        }
        .chat-area {
            background: #fefaf2;
            border-radius: 28px;
            padding: 1rem;
            min-height: 250px;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 1rem;
            border: 1px solid #ffe1aa;
        }
        .message {
            margin: 1rem 0;
            padding: 0.7rem 1rem;
            border-radius: 24px;
            max-width: 85%;
        }
        .user-msg {
            background: #f7b32b20;
            border-right: 4px solid #f7b32b;
            text-align: right;
            margin-right: auto;
        }
        .ai-msg {
            background: #ffffff;
            border-left: 4px solid #e6a017;
            text-align: right;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .input-chat {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
        }
        .input-chat input {
            flex: 1;
            padding: 0.9rem;
            border-radius: 60px;
            border: 1px solid #ffd58c;
            background: white;
        }
        .input-chat button {
            background: #f7b32b;
            border: none;
            padding: 0 1.5rem;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
        }

        @media (max-width: 700px) {
            .cards-grid {
                padding: 1.5rem;
                gap: 1.2rem;
            }
            .navbar {
                flex-direction: column;
                gap: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="app-wrapper" id="app">
    <!-- شاشة الدخول -->
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <div class="center-logo">
                <div class="logo-icon"><span>🐝🍯</span></div>
                <h1>BEE & HONEY</h1>
                <p>لوحة الإدارة الذكية — دخول مخصص للشركة فقط</p>
            </div>
            <div class="input-group">
                <label>🔐 كلمة المرور</label>
                <input type="password" id="passwordInput" placeholder="••••••••">
            </div>
            <button class="btn" id="loginBtn">تسجيل الدخول</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>

    <!-- لوحة التحكم الرئيسية (تظهر بعد تسجيل الدخول) -->
    <div id="dashboardScreen" class="dashboard">
        <div class="navbar">
            <div class="nav-logo">
                <div class="bee-icon">🐝🍯</div>
                <span>BEE & HONEY</span>
            </div>
            <button class="logout-btn" id="logoutBtn">🚪 تسجيل خروج</button>
        </div>
        <div class="cards-grid" id="cardsContainer">
            <!-- سيتم إنشاء البطاقات بواسطة js -->
        </div>
    </div>

    <!-- حاوية الصفحات الفرعية (كل قسم) -->
    <div id="sectionContainer" class="section-page"></div>
</div>

<script>
    // بيانات الأقسام الستة كما في الصور
    const sections = [
        { id: "economy", name: "إدارة اقتصاد", emoji: "📊", desc: "التحليل الاقتصادي للشركة", questions: ["جدوى التوسع", "تحليل الربحية", "تحليل التكاليف"], context: "اقتصاد" },
        { id: "crisis", name: "إدارة أزمات", emoji: "⚠️", desc: "خطط الطوارئ والحلول", questions: ["أزمة إمداد", "أزمة جودة", "أزمة سمعة"], context: "أزمات" },
        { id: "finance", name: "إدارة مالية وتنظيمية", emoji: "📈", desc: "الميزانيات والتقارير", questions: ["تحليل الميزانية السنوية", "تنظيم الهيكل المالي", "تقارير الأرباح الفصلية"], context: "مالية" },
        { id: "marketing", name: "إدارة وتسويق", emoji: "📢", desc: "الاستراتيجيات والخدمات", questions: ["الجمهور المستهدف", "تسويق رقمي", "حملة إعلانية"], context: "تسويق" },
        { id: "sales", name: "إدارة مبيعات", emoji: "💰", desc: "المبيعات والعملاء", questions: ["قنوات توزيع", "زيادة المبيعات", "عروض وحزم"], context: "مبيعات" },
        { id: "markets", name: "دراسات الأسواق والدول", emoji: "🌍", desc: "تحليل الأسواق العالمية", questions: ["السوق الأمريكي", "السوق السعودي", "أسواق جديدة"], context: "أسواق" }
    ];

    // محاكاة الردود الذكية (حسب السياق والسؤال)
    function getMockResponse(sectionContext, userQuestion) {
        const q = userQuestion.toLowerCase();
        // ردود عامة لشركة العسل Bee & Honey
        if (sectionContext === "اقتصاد") {
            if (q.includes("جدوى التوسع")) return "📈 بناءً على دراستنا، التوسع لأسواق الخليج يحقق عائد استثماري يصل إلى 35% خلال عامين، مع شراء خطوط إنتاج جديدة وزيادة الطاقة التصديرية. يفضل البدء بالسعودية والإمارات.";
            if (q.includes("الربحية")) return "🍯 منتجات العسل الطبيعي تحقق هامش ربح صافي 42% حاليًا، وتحسين التسويق الرقمي قد يرفع المبيعات 20% إضافية.";
            if (q.includes("التكاليف")) return "🔻 خفض التكاليف: التحول للطاقة الشمسية في المناحل، شراء العسل الخام مباشرة من المزارعين، وأتمتة خط التعبئة يوفر 18% من المصاريف التشغيلية.";
            return "🧮 بناءً على التحليل الاقتصادي لـ Bee & Honey، نوصي بمراجعة هيكل التسعير وزيادة الإنتاج بنسبة 15% للاستفادة من وفورات الحجم.";
        }
        if (sectionContext === "أزمات") {
            if (q.includes("إمداد")) return "🚨 خطة طوارئ الإمداد: إنشاء مخزون استراتيجي لمدة 3 أشهر، التعاقد مع 3 موردين بدلاء في مناطق مختلفة، واستخدام نظام تتبع ذكي للمخزون.";
            if (q.includes("جودة")) return "✅ أزمة الجودة: تشكيل فريق استجابة سريع، سحب المنتج فورًا، فتح تحقيق شفاف، وتعويض العملاء. تطبيق نظام HACCP بشكل صارم.";
            if (q.includes("سمعة")) return "📱 إدارة السمعة: الرد المهني خلال ساعة، إطلاق حملة توضيح إيجابية، الاستعانة بمؤثرين موثوقين، وتقديم ضمانات إضافية للجودة.";
            return "🛡️ Bee & Honey لديها خطة أزمات شاملة تشمل الاتصال السريع مع وسائل الإعلام والتواصل المباشر مع العملاء.";
        }
        if (sectionContext === "مالية") {
            if (q.includes("الميزانية")) return "💰 الميزانية السنوية الموصى بها: 40% إنتاج، 25% تسويق، 15% بحث وتطوير، 10% احتياطي، 10% توسع.";
            if (q.includes("الهيكل")) return "🏛️ الهيكل المالي الأمثل: فصل حسابات التشغيل عن الاستثمار، إنشاء صندوق للطوارئ، وتعيين مراقب مالي داخلي.";
            if (q.includes("الأرباح")) return "📊 أرباح الربع الأخير: 2.4 مليون ريال، بنمو 12% عن العام الماضي. العسل العضوي الأكثر مبيعًا بنسبة 54%.";
            return "📉 ننصح بإعادة توزيع الميزانية التسويقية لزيادة العائد على الاستثمار وتحسين السيولة.";
        }
        if (sectionContext === "تسويق") {
            if (q.includes("الجمهور")) return "🎯 الجمهور المستهدف: فئة 25-45 سنة المهتمة بالصحة والعناية الطبيعية، الأمهات، والرياضيون. شرائح ذات الدخل المتوسط والمرتفع.";
            if (q.includes("تسويق رقمي")) return "📱 أفضل استراتيجية: إعلانات تيك توك وإنستغرام بمحتوى تعليمي عن فوائد العسل، شراكات مع مؤثرين صحيين، وتجربة متجر إلكتروني سهل.";
            if (q.includes("حملة")) return "🐝 حملة ‘عسل الحياة’: فيديوهات قصيرة توضح رحلة العسل من المنحل إلى المستهلك، هاشتاج #BeeAndHoney، وخصم 20% لأول 500 طلب.";
            return "💡 التسويق بالقصص (Storytelling) يزيد الولاء للعلامة التجارية Bee & Honey بنسبة تصل إلى 40%.";
        }
        if (sectionContext === "مبيعات") {
            if (q.includes("توزيع")) return "📦 أفضل قنوات: متجر إلكتروني رسمي، متاجر السوبر ماركت الفاخرة (كارفور، لولو)، والصيدليات الكبرى، وأسواق المزارعين.";
            if (q.includes("زيادة المبيعات")) return "🚀 زيادة 30%: إطلاق برنامج ولاء، عروض ‘اشتري 2 واحصل على الثالث مجانًا’، وتوسيع التوزيع في المدن الجديدة خلال 6 أشهر.";
            if (q.includes("عروض")) return "🎁 حزمة ‘هدية العسل’: علبة عسل سدر 500جم + عسل طلح 250جم + ملعقة خشبية بسعر 89 ريال بدل 120.";
            return "💎 تدريب فريق المبيعات على تقنيات البيع الاستشاري يرفع متوسط قيمة الطلب بنسبة 25%.";
        }
        if (sectionContext === "أسواق") {
            if (q.includes("الأمريكي")) return "🇺🇸 السوق الأمريكي: طلب عالٍ على العسل العضوي، لكن اشتراطات FDA صارمة. فرصة للعلامات المتخصصة، ندخل عبر أمازون وشركاء محليين.";
            if (q.includes("السعودي")) return "🇸🇦 السوق السعودي: نمو كبير في قطاع الأغذية الفاخرة. Bee & Honey تستطيع المنافسة عبر التسعير التنافسي ومواصفات الجودة الخليجية.";
            if (q.includes("أسواق جديدة")) return "🌏 أفضل الأسواق: الكويت، قطر، ثم ألمانيا وسنغافورة للعسل العضوي الفاخر. ابدأ بمعارض التجارة الدولية.";
            return "🌎 توصية: دراسة السوق الأوروبي لمنتجات العسل العضوي المعتمد، بهامش ربح مرتفع لكن تكاليف شحن أكبر.";
        }
        return "🍯 شكراً لسؤالك! سيقوم فريق Bee & Honey بتحليل طلبك وتزويدك بإجابة مفصلة قريباً.";
    }

    let currentSectionId = null;

    // عرض لوحة التحكم بالبطاقات
    function renderDashboard() {
        const container = document.getElementById('cardsContainer');
        container.innerHTML = '';
        sections.forEach(section => {
            const card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('data-id', section.id);
            card.innerHTML = `
                <div class="card-emoji">${section.emoji}</div>
                <h3>${section.name}</h3>
                <p>${section.desc}</p>
            `;
            card.addEventListener('click', () => openSection(section.id));
            container.appendChild(card);
        });
    }

    // فتح صفحة القسم (المستشار الذكي)
    function openSection(sectionId) {
        const section = sections.find(s => s.id === sectionId);
        if (!section) return;
        currentSectionId = sectionId;
        const sectionContainer = document.getElementById('sectionContainer');
        const dashboard = document.getElementById('dashboardScreen');
        dashboard.style.display = 'none';
        sectionContainer.style.display = 'block';
        // بناء واجهة القسم
        sectionContainer.innerHTML = `
            <button class="back-btn" id="backToDashboard">← العودة للوحة الرئيسية</button>
            <div class="consultant-box">
                <div class="consultant-header">
                    <div style="font-size:2.5rem;">${section.emoji}</div>
                    <div>
                        <h2>${section.name}</h2>
                        <p style="color:#ad7a3d;">${section.desc} — اسأل مستشار Bee & Honey الذكي</p>
                    </div>
                </div>
                <div class="questions-row" id="questionsRow"></div>
                <div class="chat-area" id="chatArea">
                    <div class="message ai-msg">🐝 مرحباً! أنا مستشار ${section.name} لشركة Bee & Honey. اختر أحد الأسئلة أدناه أو اكتب سؤالك الخاص.</div>
                </div>
                <div class="input-chat">
                    <input type="text" id="userQuestionInput" placeholder="اكتب سؤالك هنا...">
                    <button id="sendQuestionBtn">إرسال ➤</button>
                </div>
            </div>
        `;
        // إضافة أزرة الأسئلة المحددة مسبقاً
        const questionsRow = document.getElementById('questionsRow');
        section.questions.forEach(qText => {
            const btn = document.createElement('button');
            btn.className = 'q-btn';
            btn.textContent = qText;
            btn.addEventListener('click', () => {
                addMessageToChat('user-msg', qText);
                const response = getMockResponse(section.context, qText);
                setTimeout(() => addMessageToChat('ai-msg', response), 300);
            });
            questionsRow.appendChild(btn);
        });
        // زر العودة
        document.getElementById('backToDashboard').addEventListener('click', () => {
            sectionContainer.style.display = 'none';
            dashboard.style.display = 'block';
        });
        // إرسال السؤال المخصص
        const sendBtn = document.getElementById('sendQuestionBtn');
        const inputField = document.getElementById('userQuestionInput');
        const sendMessage = () => {
            const question = inputField.value.trim();
            if (question === "") return;
            addMessageToChat('user-msg', question);
            const response = getMockResponse(section.context, question);
            setTimeout(() => addMessageToChat('ai-msg', response), 400);
            inputField.value = '';
        };
        sendBtn.addEventListener('click', sendMessage);
        inputField.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    }

    function addMessageToChat(className, text) {
        const chatArea = document.getElementById('chatArea');
        if (!chatArea) return;
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        msgDiv.innerHTML = `<span>${text}</span>`;
        chatArea.appendChild(msgDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    // إدارة حالة تسجيل الدخول
    const loginScreen = document.getElementById('loginScreen');
    const dashboardScreen = document.getElementById('dashboardScreen');
    const loginBtn = document.getElementById('loginBtn');
    const passwordInput = document.getElementById('passwordInput');
    const loginError = document.getElementById('loginError');
    const logoutBtn = document.getElementById('logoutBtn');

    function doLogin() {
        const pwd = passwordInput.value;
        if (pwd === "BeeHoney2024") {
            loginScreen.style.display = 'none';
            dashboardScreen.style.display = 'block';
            document.getElementById('sectionContainer').style.display = 'none';
            renderDashboard();
            loginError.innerText = '';
            passwordInput.value = '';
        } else {
            loginError.innerText = '❌ كلمة المرور غير صحيحة. يرجى المحاولة مرة أخرى.';
        }
    }

    loginBtn.addEventListener('click', doLogin);
    passwordInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') doLogin(); });

    logoutBtn.addEventListener('click', () => {
        loginScreen.style.display = 'flex';
        dashboardScreen.style.display = 'none';
        document.getElementById('sectionContainer').style.display = 'none';
        loginError.innerText = '';
    });

    // في البداية إخفاء اللوحة وإظهار تسجيل الدخول
    loginScreen.style.display = 'flex';
    dashboardScreen.style.display = 'none';
    document.getElementById('sectionContainer').style.display = 'none';
</script>
</body>
</html>
